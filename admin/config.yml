backend:
  name: git-gateway
  repo: EVNIKAFASHION/EVNIKA   # e.g. john/evnika-store
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "products"
    label: "Products"
    folder: "_products"
    create: true
    slug: "{{slug}}"
    format: "json"
    fields:
      - { label: "ID", name: "id", widget: "number" }
      - { label: "Product Name", name: "name", widget: "string" }
      - { label: "Brand", name: "brand", widget: "string" }
      - { label: "Description", name: "desc", widget: "text" }
      - { label: "Price (₹)", name: "price", widget: "number" }
      - { label: "Original Price (₹)", name: "originalPrice", widget: "number" }
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["saree", "men", "accessories"]
      - label: "Badge"
        name: "badge"
        widget: "select"
        options: ["", "New", "Sale", "Hot", "Limited"]
        required: false
      - label: "Images"
        name: "images"
        widget: "list"
        field: { label: "Image URL", name: "url", widget: "string" }
