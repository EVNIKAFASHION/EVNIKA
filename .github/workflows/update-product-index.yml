name: Update Product Index

on:
  push:
    paths:
      - '_products/**.json'

jobs:
  update-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Generate _products/index.json
        run: |
          cd _products
          ls *.json | grep -v index.json | jq -R . | jq -s . > index.json

      - name: Commit index.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add _products/index.json
          git diff --staged --quiet || git commit -m "Auto-update product index"
          git push
